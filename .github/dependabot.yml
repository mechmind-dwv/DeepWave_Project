version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    labels:
      - "dependencias"
      - "automático"
    reviewers:
      - "mechmind-dwv"
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
